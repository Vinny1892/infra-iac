apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: argocd
  annotations:
    external-dns.alpha.kubernetes.io/target: k8s-traefik-traefik-b1092d969c-29bb905179fb476a.elb.us-east-1.amazonaws.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd-k3s.vinny.dev.br`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80
  tls:
    secretName: argocd-k3s-tls
